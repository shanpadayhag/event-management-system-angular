<div>
  <div class="flex flex-col gap-4">
    <div class="px-4 flex gap-2">
      <c-button [variant]="'ghost'" [size]="'icon'" (click)="showPreviousMonth()"><lucide-angular
          [img]="ChevronLeft" /></c-button>

      <combobox [options]="[{
          value: '0',
          label: 'January',
        }, {
          value: '1',
          label: 'February',
        }, {
          value: '2',
          label: 'March',
        }, {
          value: '3',
          label: 'April',
        }, {
          value: '4',
          label: 'May',
        }, {
          value: '5',
          label: 'June',
        }, {
          value: '6',
          label: 'July',
        }, {
          value: '7',
          label: 'August',
        }, {
          value: '8',
          label: 'September',
        }, {
          value: '9',
          label: 'October',
        }, {
          value: '10',
          label: 'November',
        }, {
          value: '11',
          label: 'December',
        }]" [selectedOption]="{
          value: _selectedDate.getMonth().toString(),
          label: format(_selectedDate, 'MMMM'),
        }" [placeholder]="'Select month...'" [searchPlaceholder]="'Search month...'" (selectOption)="setMonth($event)"
        [className]="'w-[190px]'" />

      <c-input [value]="_selectedDate.getFullYear().toString()" (valueChange)="setYear($event)" [className]="'w-[57px]'"
        [placeholder]="'Year'" />

      <c-button [variant]="'ghost'" [size]="'icon'" (click)="showNextMonth()"><lucide-angular
          [img]="ChevronRight" /></c-button>
    </div>

    <div class="px-4 pb-4">
      <event-calendar />
    </div>
  </div>
</div>
